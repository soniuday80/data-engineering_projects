# Creating the compose file for all the services I need
version: '3.8' # Tells the syntax and format used in docker compose file

services:
  kafka:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9092:9092" # Machine to container port. Using the dash (-) defines an array.
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      # Format: {id}@{host}:{port} — port 9093 is the CONTROLLER endpoint (internal cluster coordination),
      # NOT the broker port 9092. The controller handles metadata and leader election in KRaft mode.
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093' 
      KAFKA_LISTENERS: 'PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - esports-net

  kafka-ui: # Kafka UI on 8080 port
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - esports-net

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescale
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./timescale_data:/var/lib/postgresql/data
    networks:
      - esports-net

  flink-jobmanager:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    volumes:
      - ./flink_jobs:/opt/flink/flink_jobs
    command: jobmanager
    depends_on:
      - kafka
    networks:
      - esports-net

  flink-taskmanager:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - flink-jobmanager
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - ./flink_jobs:/opt/flink/flink_jobs
    networks:
      - esports-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_MAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS}
    ports:
      - "5050:80" # Access pgAdmin at localhost:5050
    depends_on:
      - timescaledb
    networks:
      - esports-net

networks:
  esports-net:
    driver: bridge
